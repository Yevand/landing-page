<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="./icons/favicon.png" class="invert">
  <link rel="stylesheet" href="./output.css" />
  <title>Document</title>
</head>

<body class="bg-gray-50">
  <script type="module" src="./hooks.js"></script>
  <header class="flex w-full h-24 bg-black mb-8 items-center justify-center p-4">
    <div class="flex w-full max-w-6xl items-center justify-between h-17 text-white font-lato">
      <span class="w-auto h-5 flex items-center">
        <p id="logo" class="hidden sm:block">
          Premium&nbsp;<span class="bg-blue-400 px-2 py-0.5 rounded-[3px] text-xs font-bold">CARS</span>
        </p>
      </span>
      <a class="login-icon flex items-center justify-center md:hidden">
        <img src="./icons/login-icon.jpg" alt="login" class="invert w-10 h-10">
      </a>
      <nav class="flex flex-1 sm:flex-initial justify-center gap-4 sm:gap-10">
        <a id="step-1" class="hover:text-blue-400" href=""></a>
        <a id="step-2" class="hover:text-blue-400" href=""></a>
        <a id="step-3" class="hover:text-blue-400" href=""></a>
        <a id="step-4" class="hover:text-blue-400" href=""></a>
      </nav>
      <div class="flex justify-center items-center gap-4">
        <fieldset id="language-toggle" class="flex flex-col md:flex-row text-white gap-1 pl-2 pr-2">
          <input id="en" name="lang" type="radio" class="appearance-none hidden" checked>
          <label for="en"
            class="cursor-pointer text-[12px] md:text-[16px] active:text-blue-400 hover:text-blue-400 uppercase">en</label>
          <input id="de" name="lang" type="radio" class="appearance-none hidden">
          <label for="de"
            class="cursor-pointer text-[12px] md:text-[16px] active:text-blue-400 hover:text-blue-400 uppercase">de</label>
        </fieldset>

        <a class="login-icon md:flex items-center justify-center hidden">
          <img src="./icons/login-icon.jpg" alt="login" class="invert w-10 h-10">
        </a>
      </div>
    </div>
  </header>
  <h1 class="flex justify-center text-center text-balance font-bold text-shadow-black/80 text-3xl mb-5"></h1>
  <h2 id="explore-cars-section-heading"
    class="flex justify-center text-center text-balance font-normal text-shadow-black/80 text-2xl mb-5"></h2>
  <section
    class="grid grid-cols-1 gap-6 justify-self-center max-w-6xl w-full px-4 mb-3 md:grid-cols-2 md:grid-rows-2 lg:grid-cols-3">
    <div id="car-1" class="relative overflow-hidden rounded-lg md:row-span-2 h-100 md:h-auto">
      <a class="w-full h-full" href="">
        <img class="w-full h-full object-cover" src="./media/polo.jpeg" alt="">
      </a>
      <svg id="new-tag" class="absolute top-7 left-5" width="60" height="20" viewBox="0 0 60 20"
        xmlns="http://www.w3.org/2000/svg">
        <rect width="100%" height="100%" rx="3" fill="" />
        <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" fill="white" font-family="sans-serif"
          font-size="10" font-weight="bold">
        </text>
      </svg>
      <div class="absolute p-3 bottom-0 bg-linear-to-t from-black/80 to-transparent w-full">
        <h3 class="text-white/70 font-normal text-[14px]"></h3>
        <p class="text-white font-bold leading-tight"></p>
      </div>
    </div>

    <div id="car-2" class="relative overflow-hidden rounded-lg h-62 md:h-auto md:col-start-2 md:row-start-1">
      <a class="w-full h-full" href="">
        <img class="w-full h-full object-cover" src="./media/t-roc.jpeg" alt="">
      </a>
      <div class="absolute p-3 bottom-0 p-6bg-linear-to-t from-black/80 to-transparent w-full">
        <h3 class="text-white/70 font-normal text-[14px]"></h3>
        <p class="text-white font-bold"></p>
      </div>
    </div>

    <div id="car-3" class="relative overflow-hidden rounded-lg  h-62 md:h-auto md:col-start-2 md:row-start-2">
      <a class="w-full h-full" href="">
        <img class="w-full h-full object-cover" src="./media/touareg.jpeg" alt="">
      </a>
      <div class="absolute p-3 bottom-0 p-6bg-linear-to-t from-black/80 to-transparent w-full">
        <h3 class="text-white/70 font-normal text-[14px]"></h3>
        <p class="text-white font-bold"></p>
      </div>
    </div>

    <div id="car-4" class="relative overflow-hidden rounded-lg md:hidden lg:block">
      <a class="w-full h-full" href="">
        <img class="w-full h-full object-cover" src="./media/tourer.jpeg" alt="">
      </a>
      <div class="absolute p-3 bottom-0 p-6bg-linear-to-t from-black/80 to-transparent w-full">
        <h3 class="text-white/70 font-normal text-[14px]"></h3>
        <p class="text-white font-bold"></p>
      </div>
    </div>

    <div id="car-5" class="relative overflow-hidden rounded-lg md:hidden lg:block">
      <a class="w-full h-full" href="">
        <img class="w-full h-full object-cover" src="./media/cabrio.jpeg" alt="">
      </a>
      <svg id="promotion-tag" class="absolute top-7 left-5" width="60" height="20" viewBox="0 0 60 20"
        xmlns="http://www.w3.org/2000/svg">
        <rect width="100%" height="100%" rx="3" fill="" />
        <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" fill="white" font-family="sans-serif"
          font-size="10" font-weight="bold">
        </text>
      </svg>
      <div class="absolute p-3 bottom-0 p-6bg-linear-to-t from-black/80 to-transparent w-full">
        <h3 class="text-white/70 font-normal text-[14px]"></h3>
        <p class="text-white font-bold"></p>
      </div>
    </div>
    </div>
  </section>
</body>

</html>
